<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outriders Worldslayer — Build Planner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-class" id="brand-class">TECHNOMANCER</span>
        <span class="brand-sub">Worldslayer Build Planner</span>
      </div>
      <div class="class-switch" id="class-switch"></div>
      <div class="topbar-actions">
        <button id="btn-recap" class="btn btn-accent">Build recap</button>
        <button id="btn-share" class="btn btn-ghost">Copy build link</button>
        <button id="btn-whatsnew" class="btn btn-ghost">What's new</button>
        <a class="btn btn-ghost" href="https://github.com/Kernzs/Outriders-Worldslayer-planer" target="_blank" rel="noopener">GitHub</a>
        <button id="btn-reset" class="btn btn-ghost">Reset</button>
      </div>
    </header>

    <nav class="tabs" id="tabs">
      <button class="tab is-active" data-tab="tree">Class Tree</button>
      <button class="tab" data-tab="pax">PAX Trees</button>
      <button class="tab" data-tab="ascension">Ascension</button>
      <button class="tab" data-tab="loadout">Gear &amp; Skills</button>
    </nav>

    <div class="layout">
      <main class="content">
        <section class="panel" id="panel-tree"></section>
        <section class="panel hidden" id="panel-pax"></section>
        <section class="panel hidden" id="panel-ascension"></section>
        <section class="panel hidden" id="panel-loadout"></section>
      </main>

      <aside class="summary" id="summary">
        <h2 class="summary-title">Build Summary</h2>
        <div id="summary-body"></div>
      </aside>
    </div>

    <footer class="footnote">
      <a href="https://github.com/Kernzs/Outriders-Worldslayer-planer" target="_blank" rel="noopener">Source on GitHub</a> ·
      Data consolidated from
      <a href="https://outriders.fandom.com" target="_blank" rel="noopener">the Outriders Fandom wiki</a>,
      <a href="https://www.gamerguides.com/outriders-worldslayer" target="_blank" rel="noopener">GamerGuides</a>,
      <a href="https://sirusgaming.com" target="_blank" rel="noopener">sirusgaming</a>,
      <a href="https://paradoxzyx.github.io" target="_blank" rel="noopener">Breadbuilder</a> &amp;
      <a href="https://www.thegamer.com" target="_blank" rel="noopener">TheGamer</a>.
      Fan-made tool · not affiliated with Square Enix / People Can Fly.
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
